<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Together Lite</title>
    <!-- Используем встроенную микро-библиотеку для связи (она очень маленькая) -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; text-align: center; padding: 20px; margin: 0; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 20px; border: 1px solid #333; max-width: 400px; margin: 0 auto 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        input { width: 85%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; margin: 10px 0; font-size: 16px; outline: none; }
        button { background: #0077ff; color: #fff; border: none; padding: 14px; border-radius: 10px; width: 95%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .secondary { background: #333; margin-top: 10px; }
        iframe { width: 100%; height: 350px; border: none; border-radius: 12px; background: #000; margin-top: 20px; }
        #roomInfo { font-size: 18px; color: #00ff88; font-weight: bold; margin: 10px 0; }
        #userList { font-size: 13px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="auth" class="card">
        <h2>VK Together</h2>
        <input type="text" id="nick" placeholder="Ваш ник">
        <button onclick="init('leader')">СОЗДАТЬ КОМНАТУ</button>
        <p style="color:#555">ИЛИ</p>
        <input type="text" id="joinCode" placeholder="Код комнаты">
        <button class="secondary" onclick="init('viewer')">ВОЙТИ ПО КОДУ</button>
    </div>

    <div id="app" class="card" style="display:none;">
        <div id="roomInfo">КОД: <span id="codeText"></span></div>
        <div id="userList">В комнате: <span id="users"></span></div>
        
        <div id="leaderUI" style="display:none;">
            <input type="text" id="videoUrl" placeholder="Вставьте код iframe из ВК">
            <button onclick="sendVideo()">ЗАПУСТИТЬ У ВСЕХ</button>
        </div>
        <div id="viewerUI" style="display:none;"><p>Ожидание лидера...</p></div>
    </div>

    <div id="playerArea"></div>

    <script>
        // Децентрализованная база данных (не требует ключей и регистрации)
        const gun = Gun(['https://gun-manhattan.herokuapp.com']);
        let myNick, myRole, roomID, lastUrl;

        function init(role) {
            myNick = document.getElementById('nick').value.trim();
            if (!myNick) return alert("Введите ник!");

            if (role === 'leader') {
                roomID = Math.random().toString(36).substring(7, 11);
                myRole = 'leader';
            } else {
                roomID = document.getElementById('joinCode').value.trim().toLowerCase();
                if (!roomID) return alert("Введите код!");
                myRole = 'viewer';
            }

            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('codeText').innerText = roomID;

            if (myRole === 'leader') document.getElementById('leaderUI').style.display = 'block';
            else document.getElementById('viewerUI').style.display = 'block';

            // Регистрация ника в списке
            gun.get('rooms').get(roomID).get('users').get(myNick).put(true);

            // Слушаем список людей
            gun.get('rooms').get(roomID).get('users').map().on((val, name) => {
                if (val) {
                    const span = document.getElementById('users');
                    if (!span.innerText.includes(name)) {
                        span.innerText += (span.innerText ? ", " : "") + name;
                    }
                }
            });

            // Слушаем видео
            gun.get('rooms').get(roomID).get('video').on((url) => {
                if (url && url !== lastUrl) {
                    lastUrl = url;
                    render(url);
                }
            });
        }

        function sendVideo() {
            let input = document.getElementById('videoUrl').value;
            let url = input;
            if (input.includes('src="')) {
                let s = input.indexOf('src="') + 5;
                let e = input.indexOf('"', s);
                url = input.substring(s, e);
            }
            if (url && !url.includes('http')) url = 'https:' + url;
            
            // Отправляем в базу
            gun.get('rooms').get(roomID).get('video').put(url);
        }

        function render(url) {
            let src = url + (url.includes('?') ? '&' : '?') + 'autoplay=1';
            document.getElementById('playerArea').innerHTML = `<iframe src="${src}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        }
    </script>
</body>
</html>
