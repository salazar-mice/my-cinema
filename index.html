<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Watch Party</title>
 <!-- Подключаем сверхнадежную библиотеку связи -->
<script src="https://cdn.pubnub.com"></script>
<script>
    // Создаем подключение (Бесплатные ключи для теста)
    const pubnub = new PubNub({
        publishKey: 'pub-c-46764724-4d8e-4a6c-9418-8f5509930f40',
        subscribeKey: 'sub-c-10143894-3580-4547-9759-45664197368d',
        userId: "user_" + Math.random().toString(36).substring(7)
    });

    // Комната для вас и друга (придумайте любое слово)
    const channel = 'my_private_cinema_room_123'; 

    pubnub.subscribe({ channels: [channel] });

    pubnub.addListener({
        message: function(event) {
            if (event.message.type === 'VIDEO') {
                showVideo(event.message.url);
            }
        }
    });

    function sendVideo() {
        const url = document.getElementById('videoUrl').value;
        if (!url) return;
        
        showVideo(url); // Открываем у себя
        
        pubnub.publish({
            channel: channel,
            message: { type: 'VIDEO', url: url }
        });
    }

    function showVideo(url) {
        let cleanUrl = url;
        if (url.includes('src="')) {
            cleanUrl = url.split('src="')[1].split('"')[0];
        }
        document.getElementById('playerContainer').innerHTML = 
            `<iframe src="${cleanUrl}" allow="autoplay; encrypted-media" allowfullscreen 
             style="width:100%; height:450px; border:none; margin-top:20px;"></iframe>`;
    }

    // Вместо ID теперь просто пишем статус
    document.getElementById('myId').innerText = "СВЯЗЬ АКТИВНА (Комната: " + channel + ")";
</script>
    <style>
        body { background: #121212; color: #fff; font-family: -apple-system, sans-serif; text-align: center; padding: 20px; margin: 0; }
        .card { background: #1e1e1e; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        input { width: 80%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #252525; color: #fff; margin: 10px 0; }
        button { background: #0077ff; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: 300px; border-radius: 10px; margin-top: 15px; background: #000; border: none; }
        #myId { color: #00ff88; font-weight: bold; word-break: break-all; cursor: pointer; display: block; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h3>1. Ваше устройство</h3>
        <p>Ваш ID (нажми, чтобы скопировать):</p>
        <span id="myId">Инициализация...</span>
    </div>

    <div class="card">
        <h3>2. Подключение</h3>
        <input type="text" id="peerIdInput" placeholder="Введите ID друга">
        <button onclick="connectToPeer()">Соединить устройства</button>
    </div>

    <div class="card">
        <h3>3. Видео</h3>
        <input type="text" id="videoUrl" placeholder="Вставьте ссылку src из ВК">
        <button onclick="sendVideo()">Запустить у всех</button>
        <div id="playerContainer"></div>
    </div>

    <script>
  // Используем стандартные настройки с принудительным включением отладки
let peer = new Peer(null, {
    debug: 2,
    config: {
        'iceServers': [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    }
});

// Добавим обработку ошибки, чтобы понять, в чем дело
peer.on('error', (err) => {
    console.error(err);
    document.getElementById('myId').innerText = "Ошибка сети: " + err.type;
});

        // Копирование по клику
        document.getElementById('myId').onclick = function() {
            navigator.clipboard.writeText(this.innerText);
            alert("ID скопирован!");
        };

        // Слушаем входящие подключения
        peer.on('connection', (connection) => {
            conn = connection;
            handleData();
            alert("Друг подключился!");
        });

        // Подключаемся к другу сами
        function connectToPeer() {
            const remoteId = document.getElementById('peerIdInput').value;
            if (!remoteId) return alert("Введите ID!");
            conn = peer.connect(remoteId);
            handleData();
            alert("Запрос на соединение отправлен!");
        }

        function handleData() {
            conn.on('data', (data) => {
                if (data.type === 'VIDEO') {
                    showVideo(data.url);
                }
            });
        }

        function sendVideo() {
            const url = document.getElementById('videoUrl').value;
            if (!url) return;
            showVideo(url);
            if (conn && conn.open) {
                conn.send({ type: 'VIDEO', url: url });
            }
        }

        function showVideo(url) {
            // Очистка ссылки на случай, если вставили весь <iframe>
            let cleanUrl = url;
            if (url.includes('src="')) {
                cleanUrl = url.split('src="')[1].split('"')[0];
            }
            document.getElementById('playerContainer').innerHTML = 
                `<iframe src="${cleanUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        }
    </script>
</body>
</html>
