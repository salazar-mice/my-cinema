<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Premium Party</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .card { background: #161616; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; }
        .status-bar { display: flex; justify-content: space-around; font-size: 12px; color: #888; margin-bottom: 10px; }
        input { width: 80%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; margin: 10px 0; }
        button { background: #0077ff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        button:disabled { background: #444; cursor: not-allowed; }
        iframe { width: 100%; height: 400px; border-radius: 10px; border: none; background: #000; margin-top: 15px; }
        #log { font-size: 11px; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <div class="status-bar">
        <span>Ваш ID: <b id="myId">...</b></span>
        <span>Роль: <b id="role">Зритель</b></span>
    </div>
    <input type="text" id="peerIdInput" placeholder="ID партнера">
    <button onclick="connectToPeer()">Подключиться</button>
    <button id="reqBtn" onclick="requestLead()" style="display:none; background:#ff9500;">Стать лидером</button>
</div>

<div class="card">
    <input type="text" id="videoUrl" placeholder="Вставьте ссылку src из ВК" disabled>
    <button id="sendBtn" onclick="sendVideo()" disabled>Запустить у всех</button>
</div>

<div id="playerContainer"></div>
<div id="log"></div>

<script>
    let peer = new Peer(null, { debug: 2 });
    let conn;
    let isLeader = false;

    peer.on('open', id => { document.getElementById('myId').innerText = id; });

    // Прием подключения
    peer.on('connection', newConn => {
        conn = newConn;
        setupListener();
        // Первый подключившийся становится лидером по умолчанию
        if (!isLeader) setRole(true);
    });

    function connectToPeer() {
        const id = document.getElementById('peerIdInput').value;
        conn = peer.connect(id);
        setupListener();
    }

    function setupListener() {
        document.getElementById('reqBtn').style.display = 'inline-block';
        conn.on('data', data => {
            if (data.type === 'VIDEO') renderPlayer(data.url);
            if (data.type === 'REQ_LEAD') {
                if (confirm("Пользователь хочет стать лидером. Передать права?")) {
                    setRole(false);
                    conn.send({ type: 'GIVE_LEAD' });
                }
            }
            if (data.type === 'GIVE_LEAD') {
                setRole(true);
                alert("Теперь вы лидер!");
            }
        });
        conn.on('open', () => alert("Соединение установлено!"));
    }

    function setRole(lead) {
        isLeader = lead;
        document.getElementById('role').innerText = lead ? "Лидер" : "Зритель";
        document.getElementById('videoUrl').disabled = !lead;
        document.getElementById('sendBtn').disabled = !lead;
    }

    function requestLead() {
        if (conn) conn.send({ type: 'REQ_LEAD' });
    }

    function sendVideo() {
        let url = document.getElementById('videoUrl').value;
        // Исправленный парсер: ищем src в iframe или берем чистую ссылку
        let match = url.match(/src=["']([^"']+)["']/);
        let finalUrl = match ? match[1] : url;

        if (!finalUrl.includes('http')) finalUrl = 'https:' + finalUrl;

        renderPlayer(finalUrl);
        if (conn) conn.send({ type: 'VIDEO', url: finalUrl });
    }

    function renderPlayer(url) {
        // Добавляем параметры, чтобы плеер ВК не "капризничал"
        const cleanUrl = url.split('&')[0] + '&autoplay=1';
        document.getElementById('playerContainer').innerHTML = 
            `<iframe src="${cleanUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    }
</script>
</body>
</html>
