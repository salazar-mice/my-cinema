<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Private Cinema</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { background: #0f0f0f; color: #eee; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .box { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
        iframe { width: 100%; max-width: 800px; height: 450px; border-radius: 8px; border: none; background: #000; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #2b2b2b; color: white; }
        button { padding: 10px 15px; border-radius: 5px; border: none; background: #0077ff; color: white; cursor: pointer; }
        #myId { font-weight: bold; color: #00ff88; cursor: pointer; }
    </style>
</head>
<body>

    <div class="box">
        <p>Ваш ID (нажми, чтобы скопировать): <span id="myId">Подключение...</span></p>
        <input type="text" id="peerIdInput" placeholder="ID друга для подключения">
        <button onclick="connectToPeer()">Подключиться к другу</button>
    </div>

    <div class="box">
        <input type="text" id="videoUrl" placeholder="Вставьте ссылку из ВК (Экспорт -> src)">
        <button onclick="sendVideo()">Открыть видео у всех</button>
    </div>

    <div id="playerContainer">
        <p>Здесь появится плеер после вставки ссылки</p>
    </div>

   <script>
    let peer = new Peer(); 
    let conn;

    // Отображаем ваш ID для подключения
    peer.on('open', (id) => {
        document.getElementById('myId').innerText = id;
    });

    // Принимаем входящее соединение (например, с айфона на ПК)
    peer.on('connection', (connection) => {
        conn = connection;
        setupSync();
    });

    // Функция подключения к другу
    function connectToPeer() {
        const remoteId = document.getElementById('peerIdInput').value;
        conn = peer.connect(remoteId);
        setupSync();
    }

    function setupSync() {
        conn.on('data', (data) => {
            if (data.type === 'VIDEO_URL') {
                renderPlayer(data.url);
            }
        });
        alert("Связь установлена!");
    }

    // Отправка видео всем участникам
    function sendVideo() {
        let input = document.getElementById('videoUrl').value;
        let finalUrl = input;

        // Если вставили весь код iframe, вырезаем только ссылку src
        if (input.includes('src="')) {
            finalUrl = input.split('src="')[1].split('"')[0];
        }

        renderPlayer(finalUrl);
        if (conn) conn.send({ type: 'VIDEO_URL', url: finalUrl });
    }

    function renderPlayer(url) {
        document.getElementById('playerContainer').innerHTML = 
            `<iframe src="${url}" allow="autoplay; encrypted-media" allowfullscreen 
             style="width:100%; height:450px; border:none;"></iframe>`;
    }
</script>
</body>
</html>
