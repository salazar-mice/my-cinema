<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Together Sync</title>
    <!-- Библиотека Supabase -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 20px; border: 1px solid #333; max-width: 400px; margin: 0 auto 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        input { width: 85%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; margin: 10px 0; font-size: 16px; outline: none; }
        button { background: #0077ff; color: #fff; border: none; padding: 14px; border-radius: 10px; width: 95%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .secondary { background: #333; margin-top: 10px; }
        iframe { width: 100%; height: 300px; border: none; border-radius: 12px; background: #000; margin-top: 20px; }
        #roomCodeDisplay { font-size: 22px; color: #00ff88; font-weight: bold; margin: 10px 0; letter-spacing: 2px; }
        #userList { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="auth" class="card">
        <h2>VK Together</h2>
        <input type="text" id="nick" placeholder="Ваш ник">
        <button onclick="startSession('leader')">СОЗДАТЬ КОМНАТУ</button>
        <p style="color:#555">ИЛИ</p>
        <input type="text" id="joinCode" placeholder="Код комнаты">
        <button class="secondary" onclick="startSession('viewer')">ВОЙТИ ПО КОДУ</button>
    </div>

    <div id="app" class="card" style="display:none;">
        <div id="roomCodeDisplay">КОД: <span id="codeText"></span></div>
        <div id="userList"></div>
        
        <div id="leaderUI" style="display:none;">
            <input type="text" id="videoUrl" placeholder="Вставьте код iframe из ВК">
            <button onclick="updateVideo()">ЗАПУСТИТЬ У ВСЕХ</button>
        </div>

        <div id="viewerUI" style="display:none;">
            <p style="color: #888; font-size: 14px;">Ожидание видео от лидера...</p>
            <button class="secondary" style="width:70%; padding:8px; font-size:12px;" onclick="claimControl()">Стать лидером (1111)</button>
        </div>
    </div>

    <div id="playerArea"></div>

    <script>
        // ТВОИ КЛЮЧИ SUPABASE
        const SUPABASE_URL = 'https://dbpchlkstyptecgmujlio.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRicGNobGtzeXB0ZWNnbXVqbGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDYzODQsImV4cCI6MjA4OTU4MjM4NH0.OtaUIt2G9IOU_bK1bvTWRaySD3EPpIfu3ikic3aHndE';
        
        const supabase = bootstrapSupabase();
        function bootstrapSupabase() {
            return window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        let myNick, myRole, currentRoom, lastUrl;

        async function startSession(role) {
            myNick = document.getElementById('nick').value.trim();
            if (!myNick) return alert("Введите ник!");

            if (role === 'leader') {
                currentRoom = Math.random().toString(36).substring(7, 11);
                myRole = 'leader';
                // Создаем запись в базе
                await supabase.from('rooms').insert([{ id: currentRoom, leader_name: myNick, video_url: '' }]);
            } else {
                currentRoom = document.getElementById('joinCode').value.trim().toLowerCase();
                if (!currentRoom) return alert("Введите код!");
                myRole = 'viewer';
            }

            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('codeText').innerText = currentRoom;
            document.getElementById('userList').innerText = "Вы: " + myNick;

            if (myRole === 'leader') document.getElementById('leaderUI').style.display = 'block';
            else document.getElementById('viewerUI').style.display = 'block';

            // Проверка обновлений каждые 2 секунды
            setInterval(syncVideo, 2000);
        }

        async function updateVideo() {
            let input = document.getElementById('videoUrl').value;
            let url = input;
            if (input.includes('src="')) {
                let start = input.indexOf('src="') + 5;
                let end = input.indexOf('"', start);
                url = input.substring(start, end);
            }
            if (url && !url.includes('http')) url = 'https:' + url;

            await supabase.from('rooms').update({ video_url: url }).eq('id', currentRoom);
            render(url);
        }

        async function syncVideo() {
            const { data, error } = await supabase.from('rooms').select('video_url').eq('id', currentRoom).single();
            if (data && data.video_url && data.video_url !== lastUrl) {
                lastUrl = data.video_url;
                render(data.video_url);
            }
        }

        function claimControl() {
            if (prompt("Пароль:") === "1111") {
                myRole = 'leader';
                document.getElementById('leaderUI').style.display = 'block';
                document.getElementById('viewerUI').style.display = 'none';
            }
        }

        function render(url) {
            let src = url;
            if (src.indexOf('autoplay') === -1) src += (src.indexOf('?') === -1 ? '?' : '&') + 'autoplay=1';
            document.getElementById('playerArea').innerHTML = `<iframe src="${src}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        }
    </script>
</body>
</html>
