<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Sync Party</title>
    <!-- Подключаем Firebase для мгновенной синхронизации -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .card { background: #161616; border: 1px solid #333; padding: 20px; border-radius: 15px; max-width: 500px; margin: 0 auto 15px; }
        .hidden { display: none; }
        input { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; margin: 10px 0; }
        button { background: #0077ff; color: #fff; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        #playerContainer iframe { width: 100%; height: 400px; border-radius: 10px; border: none; background: #000; margin-top: 15px; }
        .status { font-size: 12px; color: #00ff88; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="authScreen" class="card">
        <h2>VK Sync</h2>
        <button onclick="createRoom()">Создать комнату (Лидер)</button>
        <p>ИЛИ</p>
        <input type="text" id="roomInput" placeholder="Код комнаты">
        <button onclick="joinRoom()" style="background: #333;">Войти как зритель</button>
    </div>

    <div id="mainScreen" class="card hidden">
        <div id="roleInfo" class="status">Роль: ...</div>
        <div style="font-size:12px; color:#888;">Код: <b id="roomDisplay" style="color:#fff"></b></div>
        
        <div id="leaderUI" class="hidden">
            <input type="text" id="videoUrl" placeholder="Вставьте код iframe из ВК">
            <button onclick="setVideo()">ЗАПУСТИТЬ У ВСЕХ</button>
        </div>
        
        <button id="reqBtn" onclick="requestControl()" style="background:#ff9500; display:none; margin-top:10px;">Запросить управление</button>
    </div>

    <div id="playerContainer"></div>

    <script>
        // БЕСПЛАТНАЯ БАЗА ДАННЫХ ДЛЯ ТЕСТА (Работает в РФ)
        const firebaseConfig = {
            databaseURL: "https://vksync-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomId = '';
        let isLeader = false;
        let currentUrl = '';

        function createRoom() {
            roomId = Math.random().toString(36).substring(7);
            isLeader = true;
            startApp();
        }

        function joinRoom() {
            roomId = document.getElementById('roomInput').value;
            if (!roomId) return alert("Введите код!");
            isLeader = false;
            startApp();
        }

        function startApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            document.getElementById('roomDisplay').innerText = roomId;
            document.getElementById('roleInfo').innerText = isLeader ? "ВЫ — ЛИДЕР" : "ВЫ — ЗРИТЕЛЬ";
            
            if (isLeader) document.getElementById('leaderUI').classList.remove('hidden');
            else document.getElementById('reqBtn').style.display = 'block';

            // СЛУШАЕМ ОБНОВЛЕНИЯ В КОМНАТЕ
            db.ref('rooms/' + roomId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                // Если видео изменилось - обновляем плеер
                if (data.url && data.url !== currentUrl) {
                    currentUrl = data.url;
                    render(data.url);
                }
                
                // Если пришел запрос на лидерство (только для лидера)
                if (isLeader && data.requestLead && confirm("Зритель хочет стать лидером?")) {
                    transferLead();
                }

                // Если лидерство передали нам
                if (!isLeader && data.leaderId === 'viewer_claimed') {
                    isLeader = true;
                    db.ref('rooms/' + roomId).update({requestLead: false, leaderId: 'active'});
                    startApp();
                }
            });
        }

        function setVideo() {
            let input = document.getElementById('videoUrl').value;
            let match = input.match(/src=["']([^"']+)["']/);
            let url = match ? match : input;
            if (!url.includes('http')) url = 'https:' + url;

            db.ref('rooms/' + roomId).update({ url: url });
        }

        function requestControl() {
            db.ref('rooms/' + roomId).update({ requestLead: true });
            alert("Запрос отправлен лидеру!");
        }

        function transferLead() {
            db.ref('rooms/' + roomId).update({ leaderId: 'viewer_claimed' });
        }

        function render(url) {
            // Добавляем autoplay для синхронного старта
            const finalUrl = url + (url.includes('?') ? '&' : '?') + 'autoplay=1';
            document.getElementById('playerContainer').innerHTML = 
                `<iframe src="${finalUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        }
    </script>
</body>
</html>
