<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Together Simple</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; text-align: center; padding: 15px; margin: 0; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 20px; border: 1px solid #333; max-width: 450px; margin: 0 auto 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        input { width: 85%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; margin: 10px 0; font-size: 16px; outline: none; }
        button { background: #0077ff; color: #fff; border: none; padding: 14px; border-radius: 10px; width: 90%; font-weight: bold; cursor: pointer; margin-top: 5px; -webkit-appearance: none; }
        .secondary { background: #333; margin-top: 10px; }
        iframe { width: 100%; height: 300px; border: none; border-radius: 12px; background: #000; margin-top: 15px; }
        #userDisplay { font-size: 13px; color: #00ff88; margin-bottom: 10px; font-weight: bold; }
        .badge { font-size: 11px; padding: 4px 8px; border-radius: 4px; background: #ff9500; color: #000; font-weight: bold; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ВВОД НИКА -->
    <div id="regScreen" class="card">
        <h2>VK Sync</h2>
        <p style="color: #888; font-size: 14px;">Введите ваше имя для входа:</p>
        <input type="text" id="nickname" placeholder="Ваш никнейм">
        <button onclick="login()">ВОЙТИ</button>
    </div>

    <!-- ЭКРАН 2: ВЫБОР РОЛИ (только если зашли на главную) -->
    <div id="roleScreen" class="card" style="display:none;">
        <h2>Вы кто?</h2>
        <button onclick="startSession('leader')">СОЗДАТЬ КОМНАТУ</button>
        <button class="secondary" onclick="startSession('viewer')">СМОТРЕТЬ С ДРУГОМ</button>
    </div>

    <!-- ЭКРАН 3: ПРИЛОЖЕНИЕ -->
    <div id="mainApp" class="card" style="display:none;">
        <div id="userDisplay"></div>
        <div id="statusTag" class="badge">ЗРИТЕЛЬ</div>
        
        <div id="leaderUI" style="display:none;">
            <input type="text" id="videoInput" placeholder="Вставьте код iframe из ВК">
            <button onclick="generateShare()">ОТКРЫТЬ ВИДЕО У ВСЕХ</button>
        </div>

        <div id="viewerUI">
            <p id="waitText">Ожидание ссылки от Лидера...</p>
            <button class="secondary" onclick="claimControl()">СТАТЬ ЛИДЕРОМ (1111)</button>
        </div>
    </div>

    <div id="playerArea"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let myNick = urlParams.get('nick') || "";
        let myRole = urlParams.get('role') || "";
        let vSrc = urlParams.get('v') || "";

        // Если ник и роль уже есть в ссылке — сразу открываем приложение
        window.onload = function() {
            if (myNick && (myRole || vSrc)) {
                showApp();
            }
        };

        function login() {
            myNick = document.getElementById('nickname').value.trim();
            if (!myNick) return alert("Ник не может быть пустым!");
            
            document.getElementById('regScreen').style.display = 'none';
            
            if (vSrc) {
                myRole = 'viewer';
                showApp();
            } else {
                document.getElementById('roleScreen').style.display = 'block';
            }
        }

        function startSession(role) {
            myRole = role;
            document.getElementById('roleScreen').style.display = 'none';
            showApp();
        }

        function showApp() {
            document.getElementById('regScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userDisplay').innerText = "Привет, " + myNick + "!";
            
            const isL = (myRole === 'leader');
            document.getElementById('statusTag').innerText = isL ? "ЛИДЕР" : "ЗРИТЕЛЬ";
            document.getElementById('statusTag').style.background = isL ? "#00ff88" : "#ff9500";
            document.getElementById('leaderUI').style.display = isL ? 'block' : 'none';
            document.getElementById('viewerUI').style.display = isL ? 'none' : 'block';

            if (vSrc) {
                drawPlayer(decodeURIComponent(vSrc));
            }
        }

        function generateShare() {
            let raw = document.getElementById('videoInput').value;
            let clean = raw;
            if (raw.indexOf('src="') !== -1) {
                let start = raw.indexOf('src="') + 5;
                let end = raw.indexOf('"', start);
                clean = raw.substring(start, end);
            }
            if (clean.indexOf('http') === -1) clean = 'https:' + clean;

            // Формируем ссылку для Зрителя (без его ника, чтобы он ввел свой)
            const finalLink = window.location.origin + window.location.pathname + 
                              '?v=' + encodeURIComponent(clean) + '&role=viewer';
            
            alert("ВИДЕО ЗАГРУЖЕНО!\n\nТеперь скопируйте ссылку из адресной строки вашего браузера и отправьте её другу.");
            
            // Обновляем текущую страницу для лидера
            window.location.href = window.location.origin + window.location.pathname + 
                                  '?v=' + encodeURIComponent(clean) + '&role=leader&nick=' + encodeURIComponent(myNick);
        }

        function claimControl() {
            if (prompt("Введите пароль:") === "1111") {
                window.location.href = window.location.origin + window.location.pathname + 
                                      '?v=' + encodeURIComponent(vSrc) + '&role=leader&nick=' + encodeURIComponent(myNick);
            }
        }

        function drawPlayer(url) {
            let src = url;
            if (src.indexOf('autoplay') === -1) src += (src.indexOf('?') === -1 ? '?' : '&') + 'autoplay=1';
            document.getElementById('playerArea').innerHTML = '<iframe src="' + src + '" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
            if (document.getElementById('waitText')) document.getElementById('waitText').style.display = 'none';
        }
    </script>
</body>
</html>
