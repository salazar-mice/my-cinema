<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Together Simple</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; margin: 10px 0; }
        button { background: #0077ff; color: #fff; border: none; padding: 15px; border-radius: 8px; width: 95%; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: 400px; border: none; border-radius: 10px; margin-top: 20px; background: #111; }
        .info { color: #888; font-size: 13px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>VK Together</h2>
        <p class="info">Просто вставьте ссылку и нажмите кнопку.</p>
        <input type="text" id="videoUrl" placeholder="Вставьте ссылку src из ВК (Экспорт)">
        <button onclick="go()">ОТКРЫТЬ ВИДЕО</button>
        <p class="info" style="margin-top:10px;">Чтобы смотреть вместе, отправьте эту же ссылку другу.</p>
    </div>

    <div id="player"></div>

    <script>
        // При загрузке проверяем, есть ли видео в адресе сайта
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const videoSrc = params.get('v');
            if (videoSrc) {
                render(decodeURIComponent(videoSrc));
            }
        };

        function go() {
            let input = document.getElementById('videoUrl').value;
            if (!input) return;

            // Очищаем, если вставили весь iframe
            let finalUrl = input;
            if (input.includes('src="')) {
                finalUrl = input.split('src="')[1].split('"')[0];
            }

            // Создаем новую ссылку на ваш же сайт с параметром видео
            const newUrl = window.location.origin + window.location.pathname + '?v=' + encodeURIComponent(finalUrl);
            
            // Переходим по ней (сайт перезагрузится и откроет видео)
            window.location.href = newUrl;
        }

        function render(url) {
            document.getElementById('player').innerHTML = 
                `<iframe src="${url}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            document.getElementById('videoUrl').value = url;
        }
    </script>
</body>
</html>
