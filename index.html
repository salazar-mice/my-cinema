<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Solo Sync</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        input { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; margin: 10px 0; }
        button { background: #0077ff; color: #fff; border: none; padding: 12px; border-radius: 8px; width: 95%; font-weight: bold; cursor: pointer; }
        .btn-alt { background: #ff9500; margin-top: 10px; }
        iframe { width: 100%; height: 400px; border: none; border-radius: 10px; margin-top: 15px; background: #000; }
        .role-tag { font-size: 12px; color: #00ff88; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <div id="roleDisplay" class="role-tag">Режим: Просмотр</div>
    <input type="text" id="videoUrl" placeholder="Вставьте ссылку src из ВК">
    <button id="mainBtn" onclick="updateVideo()">ОТКРЫТЬ ВИДЕО</button>
    <button id="reqBtn" class="btn-alt" onclick="requestControl()" style="display:none;">ЗАПРОСИТЬ ПРАВА УПРАВЛЕНИЯ</button>
</div>

<div id="player"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    let currentVideo = params.get('v');
    let hasControl = !params.has('share'); // Если зашли по прямой ссылке - вы лидер

    window.onload = function() {
        if (currentVideo) {
            render(decodeURIComponent(currentVideo));
        }
        updateUI();
    };

    function updateUI() {
        const roleDisp = document.getElementById('roleDisplay');
        const input = document.getElementById('videoUrl');
        const reqBtn = document.getElementById('reqBtn');

        if (hasControl) {
            roleDisp.innerText = "Режим: Лидер (Управление)";
            input.style.display = "block";
            reqBtn.style.display = "none";
        } else {
            roleDisp.innerText = "Режим: Зритель";
            input.style.display = "none";
            document.getElementById('mainBtn').style.display = "none";
            reqBtn.style.display = "block";
        }
    }

    function updateVideo() {
        let input = document.getElementById('videoUrl').value;
        if (!input) return;

        let finalUrl = input.includes('src="') ? input.split('src="').split('"') : input;
        if (!finalUrl.includes('https:')) finalUrl = 'https:' + finalUrl;

        // Генерируем ссылку для себя (Лидер) и даем ссылку для друга (Share)
        const shareUrl = window.location.origin + window.location.pathname + '?v=' + encodeURIComponent(finalUrl) + '&share=1';
        
        alert("Видео загружено! Отправьте эту ссылку другу для совместного просмотра:\n\n" + shareUrl);
        window.location.href = window.location.origin + window.location.pathname + '?v=' + encodeURIComponent(finalUrl);
    }

    function requestControl() {
        let code = prompt("Для получения прав введите секретный код, который видит Лидер:");
        if (code === "1234") { // Простейшая логика передачи прав
            hasControl = true;
            updateUI();
        } else {
            alert("Неверный код!");
        }
    }

    function render(url) {
        document.getElementById('player').innerHTML = 
            `<iframe src="${url}&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    }
</script>
</body>
</html>
