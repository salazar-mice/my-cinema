<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Sync Pro</title>
    <!-- Используем библиотеку, которая работает напрямую между браузерами -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { background: #0d0d0d; color: #fff; font-family: -apple-system, sans-serif; text-align: center; padding: 15px; margin: 0; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 20px; border: 1px solid #333; max-width: 450px; margin: 0 auto 10px; }
        .hidden { display: none; }
        input { width: 90%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; margin: 10px 0; }
        button { background: #0077ff; color: #fff; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        #status { font-size: 12px; color: #00ff88; margin-top: 10px; }
        iframe { width: 100%; height: 350px; border-radius: 12px; border: none; background: #000; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="auth" class="card">
        <h2>VK Sync</h2>
        <button onclick="startApp('leader')">СОЗДАТЬ КОМНАТУ</button>
        <p>ИЛИ</p>
        <input type="text" id="joinId" placeholder="Введите код комнаты">
        <button onclick="startApp('viewer')" style="background:#333">ВОЙТИ В КОМНАТУ</button>
    </div>

    <div id="app" class="card hidden">
        <div id="role">Роль: ...</div>
        <div id="status">Ожидание подключения...</div>
        
        <div id="leaderUI" class="hidden">
            <input type="text" id="urlInput" placeholder="Вставьте код iframe из ВК">
            <button onclick="broadcastVideo()">ЗАПУСТИТЬ У ВСЕХ</button>
            <p style="font-size:11px; color:#888; margin-top:10px;">Ваш код комнаты (отправьте другу): <br><b id="roomCode" style="color:#fff; font-size:14px;"></b></p>
        </div>

        <div id="viewerUI" class="hidden">
            <button onclick="askControl()" style="background:#ff9500">ЗАПРОСИТЬ ПРАВА</button>
        </div>
    </div>

    <div id="playerContainer"></div>

    <script>
        let b; // Переменная для Bugout
        let isLeader = false;

        function startApp(role) {
            isLeader = (role === 'leader');
            const roomInput = document.getElementById('joinId').value;
            
            // Инициализация комнаты. Лидер создает адрес, Зритель подключается к нему.
            b = new Bugout(isLeader ? null : roomInput);
            
            document.getElementById('auth').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('roomCode').innerText = b.address();
            document.getElementById('role').innerText = isLeader ? "ВЫ — ЛИДЕР" : "ВЫ — ЗРИТЕЛЬ";
            
            if (isLeader) document.getElementById('leaderUI').classList.remove('hidden');
            else document.getElementById('viewerUI').classList.remove('hidden');

            // Слушаем сообщения
            b.on("message", (address, msg) => {
                if (msg.type === "VIDEO") render(msg.url);
                if (msg.type === "REQ_CONTROL" && isLeader) {
                    if (confirm("Зритель хочет стать лидером?")) {
                        b.send({type: "GIVE_CONTROL"});
                        setRole(false);
                    }
                }
                if (msg.type === "GIVE_CONTROL" && !isLeader) {
                    setRole(true);
                    alert("Теперь вы лидер!");
                }
            });

            b.on("seen", (address) => {
                document.getElementById('status').innerText = "УСТРОЙСТВО ПОДКЛЮЧЕНО ✅";
            });
        }

        function setRole(lead) {
            isLeader = lead;
            document.getElementById('role').innerText = lead ? "ВЫ — ЛИДЕР" : "ВЫ — ЗРИТЕЛЬ";
            document.getElementById('leaderUI').classList.toggle('hidden', !lead);
            document.getElementById('viewerUI').classList.toggle('hidden', lead);
        }

        function broadcastVideo() {
            const input = document.getElementById('urlInput').value;
            let match = input.match(/src=["']([^"']+)["']/);
            let url = match ? match : input;
            if (!url.includes('http')) url = 'https:' + url;
            
            render(url);
            b.send({type: "VIDEO", url: url});
        }

        function askControl() {
            b.send({type: "REQ_CONTROL"});
            alert("Запрос отправлен лидеру!");
        }

        function render(url) {
            const finalUrl = url + (url.includes('?') ? '&' : '?') + 'autoplay=1';
            document.getElementById('playerContainer').innerHTML = 
                `<iframe src="${finalUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        }
    </script>
</body>
</html>
